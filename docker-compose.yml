version: '3.8'
services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"

  redis:
    image: redis
    ports:
      - "6379:6379"


# docker compose up 
# docker compose down
# docker compose up -d